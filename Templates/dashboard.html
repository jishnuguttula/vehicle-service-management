<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/
bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
<h1>Dashboard</h1>
<div class="row mt-4">
<div class="col-md-4">
<div class="card p-4">
<h3>Total Customers</h3>
<h2>{{ customers }}</h2>
</div>
</div>
<div class="col-md-4">
<div class="card p-4">
<h3>Total Services</h3>
<h2>{{ services }}</h2>
</div>
</div>
<div class="col-md-4">
<div class="card p-4">
<h3>Total Revenue</h3>
<h2>₹ {{ revenue }}</h2>
</div>
</div>
</div>
<a href="/add_customer" class="btn btn-primary mt-4">
Add Customer
</a>
<a href="/add_service" class="btn btn-success mt-4">
Add Service
</a>
<a href="/logout" class="btn btn-danger mt-4">
Logout
</a>
</div>
</body>
</html
