<!DOCTYPE html>
<html>

<head>
    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h1 class="text-center mb-5">
        Vehicle Service Management Dashboard
    </h1>

    <div class="row">

        <!-- Total Customers -->
        <div class="col-md-4">
            <div class="card shadow p-4 text-center">

                <h3>Total Customers</h3>

                <h2 class="mt-3">
                    {{ customers }}
                </h2>

            </div>
        </div>

        <!-- Total Services -->
        <div class="col-md-4">
            <div class="card shadow p-4 text-center">

                <h3>Total Services</h3>

                <h2 class="mt-3">
                    {{ services }}
                </h2>

            </div>
        </div>

        <!-- Revenue -->
        <div class="col-md-4">
            <div class="card shadow p-4 text-center">

                <h3>Total Revenue</h3>

                <h2 class="mt-3">
                    ₹ {{ revenue }}
                </h2>

            </div>
        </div>

    </div>

    <!-- Buttons -->
    <div class="text-center mt-5">

        <a href="/add_customer"
           class="btn btn-primary me-3">
            Add Customer
        </a>

        <a href="/view_customer"
           class="btn btn-dark me-3">
            View Customer
        </a>

        <a href="/add_service"
           class="btn btn-success me-3">
            Add Service
        </a>
        <a href="/view_services"
           class="btn btn-secondary me-3">
            View Services
        </a>

        <a href="/logout"
           class="btn btn-danger">
            Logout
        </a>

    </div>

</div>

</body>

</html>
